<div class="container">
  <div class="content glass">
    <h1>New Universe</h1>
    <p>Start your story and make it amazing!</p>
    <form [formGroup]="universeForm" (ngSubmit)="submitForm()">
      <div class="form-group">
        <label for="title">Title</label>
        <input id="title" type="text" formControlName="title" />
      </div>
      <div class="form-group">
        <label for="description">Description</label>
        <textarea
          id="description"
          rows="5"
          formControlName="description"
        ></textarea>
      </div>
      <button [disabled]="!universeForm.valid" class="btn" type="submit">
        Let's go!
      </button>
    </form>
  </div>
</div>
