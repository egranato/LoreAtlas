<div class="container">
  <h1>
    <i class="fa-solid fa-planet-ringed"></i>
    Select a universe
  </h1>
  <ul>
    <li
      class="glass"
      *ngFor="let universe of universes"
      (click)="selectUniverse(universe)"
    >
      <p>{{ universe.title }}</p>
      <i class="fa-solid fa-sparkles"></i>
    </li>
    <li class="glass" (click)="newUniverse()">
      <p>Create a new Universe</p>
      <i class="fa-solid fa-plus"></i>
    </li>
  </ul>
</div>
