<div class="container">
  <div class="header">
    <i class="fa-light fa-gear"></i>
    <h1>User Settings</h1>
  </div>
  <div class="basic">
    <div class="loader" *ngIf="loading">
      <la-loader></la-loader>
    </div>
    <form
      *ngIf="!loading && userForm"
      [formGroup]="userForm"
      (ngSubmit)="submitForm()"
    >
      <div class="form-group">
        <label for="name">Name</label>
        <input id="name" type="text" formControlName="name" />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" />
      </div>
      <!-- refactor when you add pro users -->
      <div class="form-group">
        <label for="role">Role</label>
        <input id="role" type="text" formControlName="roles" />
      </div>
      <button class="btn" type="submit" [disabled]="!userForm.valid">
        Save
      </button>
    </form>
  </div>
</div>
